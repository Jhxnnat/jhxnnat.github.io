{% extends "base.html" %}

{% block content %}
<div class="content">
	<h1 class="title">
		{{ section.title }}
	</h1>
	{{ section.content | safe }}
	<ul>
		{% for page in section.pages %}
		<li>
			<a href="{{ page.permalink | safe }}">{{ page.title }}</a>
			<p class="small">{{ page.date }} | {{ page.description }}</p>
		</li>
		{% endfor %}
	</ul>
</div>
{% endblock content %}
