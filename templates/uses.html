{% extends "base.html" %}

{% block content %}

<meta name="description" content="{{ page.description }}">

<div class="content">
	<h1 class="title">
		{{ page.title }}
	</h1>
	<p class="small">{{ page.date }} | {{ page.description }}</p>
	<hr>
	{{ page.content | safe }}
</div>
{% endblock content %}
